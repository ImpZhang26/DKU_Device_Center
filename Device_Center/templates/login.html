<!DOCTYPE html>
<html lang="zh-CN">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 阻止 favicon.ico 404 错误 -->
    <link rel="icon" href="data:,">
    <title>登录 - Device Center</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        /* 登录标签选中状态样式 */
        .tab-label {
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .tab-label input {
            display: none;
        }
        
        .tab-label span {
            display: block;
            padding: 12px;
            text-align: center;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        
        /* 未选中状态 - 透明背景 */
        .tab-label:not(.active) span {
            background: transparent;
            color: #757575;
        }
        
        /* 选中状态 - 蓝色背景 */
        .tab-label.active span {
            background: linear-gradient(135deg, #00338D 0%);
            color: #FFFFFF;
            box-shadow: 0 2px 8px rgba(0, 51, 141, 0.3);
        }
        
        /* 使用 CSS :checked 伪类来切换状态 */
        .tab-label input:checked + span {
            background: linear-gradient(135deg, #00338D 0%);
            color: #FFFFFF;
            box-shadow: 0 2px 8px rgba(0, 51, 141, 0.3);
        }
    </style>
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-box">
            <h1 class="login-title">Device Center</h1>
            <p class="login-subtitle">设备选配中心</p>
            
            {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
            {% endif %}
            
            <form method="POST" action="{% url 'login' %}">
                {% csrf_token %}
                <div class="login-tabs">
                    <label class="tab-label active">
                        <span>管理员登录</span>
                    </label>
                </div>
                

                
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" placeholder="请输入管理员用户名" required>
                </div>
                
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" placeholder="请输入密码" required>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block">登录</button>
            </form>
            

        </div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const loginTypeInputs = document.querySelectorAll('input[name="login_type"]');
            const adminUsername = document.getElementById('username');
            const adminPassword = document.getElementById('password');
            
            // Admin fields always visible and required
            
            // 初始化
            updateTabState();
            updateForm();
        });
    </script>
</body>
</html>
