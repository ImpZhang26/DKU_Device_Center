<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacBook 选配 - 学校电脑设备选配中心</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .page-header {
            padding: 120px 20px 60px;
            background: linear-gradient(180deg, #1d1d1f 0%, #2c2c2e 100%);
            color: white;
            text-align: center;
        }
        
        .page-header h1 {
            font-size: 48px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        
        .page-header p {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.8);
        }
        
        .breadcrumb {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 32px;
            font-size: 14px;
        }
        
        .breadcrumb a {
            color: rgba(255, 255, 255, 0.6);
        }
        
        .breadcrumb a:hover {
            color: white;
        }
        
        .breadcrumb span {
            color: rgba(255, 255, 255, 0.4);
        }
        
        .selection-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 60px 20px;
        }
        
        .model-selector-section {
            margin-bottom: 48px;
        }
        
        .selector-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text-primary);
        }
        
        .model-options {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .model-btn {
            padding: 14px 28px;
            background: var(--card-background);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .model-btn:hover {
            border-color: var(--primary-color);
        }
        
        .model-btn.active {
            border-color: var(--primary-color);
            background: rgba(0, 113, 227, 0.05);
            color: var(--primary-color);
        }
        
        .config-panel {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 40px;
        }
        
        @media (max-width: 1100px) {
            .config-panel {
                grid-template-columns: 1fr;
            }
        }
        
        .config-options {
            background: var(--card-background);
            border-radius: 20px;
            padding: 32px;
            box-shadow: var(--shadow);
        }
        
        .config-group {
            margin-bottom: 32px;
        }
        
        .config-group:last-child {
            margin-bottom: 0;
        }
        
        .config-group-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .config-group-title .tag {
            font-size: 12px;
            font-weight: 400;
            color: var(--text-secondary);
            background: #f5f5f7;
        }
        
        .config-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
        }
        
        .config-option {
            padding: 16px;
            background: #f5f5f7;
            border: 2px solid transparent;
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .config-option:hover {
            background: #ebebed;
        }
        
        .config-option.selected {
            border-color: var(--primary-color);
            background: rgba(0, 113, 227, 0.05);
        }
        
        .config-option-name {
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 4px;
        }
        
        .config-option-price {
            font-size: 13px;
            color: var(--text-secondary);
        }
        
        /* 订单摘要 */
        .order-summary {
            background: var(--card-background);
            border-radius: 20px;
            padding: 32px;
            box-shadow: var(--shadow);
            height: fit-content;
            position: sticky;
            top: 80px;
        }
        
        .summary-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .summary-product {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .product-image {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #f5f5f7 0%, #e8e8ed 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .product-image svg {
            width: 40px;
            height: 40px;
            fill: #86868b;
        }
        
        .product-info h4 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .product-info p {
            font-size: 13px;
            color: var(--text-secondary);
        }
        
        .summary-config {
            margin-bottom: 24px;
        }
        
        .config-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            font-size: 14px;
            border-bottom: 1px solid #f5f5f7;
        }
        
        .config-item:last-child {
            border-bottom: none;
        }
        
        .config-item-label {
            color: var(--text-secondary);
        }
        
        .config-item-value {
            font-weight: 500;
        }
        
        .summary-divider {
            height: 1px;
            background: var(--border-color);
            margin: 16px 0;
        }
        
        .summary-price-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 14px;
        }
        
        .summary-price-row.total {
            font-size: 18px;
            font-weight: 600;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border-color);
        }
        
        .price-discount {
            color: var(--success-color);
        }
        
        .summary-actions {
            margin-top: 24px;
        }
        
        .summary-actions .btn {
            margin-bottom: 12px;
        }
        
        .summary-note {
            font-size: 12px;
            color: var(--text-secondary);
            text-align: center;
            margin-top: 16px;
            line-height: 1.5;
        }
        
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .loading-overlay.hidden {
            display: none;
        }
        
        .loading-content {
            text-align: center;
        }
        
        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--border-color);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-secondary);
        }
        
        .empty-state svg {
            width: 80px;
            height: 80px;
            fill: var(--border-color);
            margin-bottom: 24px;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar" style="background: rgba(29, 29, 31, 0.8);">
        <div class="navbar-container">
            <a href="{{ url_for('index') }}" class="navbar-brand" style="color: white;">设备选配中心</a>
            <ul class="navbar-nav">
                <li><a href="{{ url_for('apple_laptop') }}" style="color: white;">Apple</a></li>
                <li><a href="#" style="color: rgba(255,255,255,0.6);">Dell</a></li>
                <li><a href="#" style="color: rgba(255,255,255,0.6);">Lenovo</a></li>
            </ul>
            <div class="user-info" id="user-info" style="background: rgba(255,255,255,0.1); color: white;">
                <span id="user-name"></span>
                <a href="#" onclick="logout(); return false;" style="color: #2997ff;">退出</a>
            </div>
        </div>
    </nav>
    
    <!-- 页面头部 -->
    <header class="page-header">
        <div class="breadcrumb">
            <a href="{{ url_for('apple_center') }}">Apple</a>
            <span>/</span>
            <span>MacBook 选配</span>
        </div>
        <h1>MacBook 选配</h1>
        <p>选择最适合您工作需求的配置</p>
    </header>
    
    <!-- 选配容器 -->
    <div class="selection-container">
        <!-- 型号选择 -->
        <div class="model-selector-section">
            <div class="selector-title">选择型号</div>
            <div class="model-options" id="model-options">
                <span class="loading"></span> 加载中...
            </div>
        </div>
        
        <!-- 配置面板 -->
        <div class="config-panel">
            <div class="config-options" id="config-options">
                <div class="empty-state">
                    <svg viewBox="0 0 24 24"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.21-1.96 1.08-3.11-1.06.05-2.36.69-3.14 1.55-.68.75-1.26 1.94-1.1 3.07 1.19.09 2.41-.79 3.16-1.51z"/></svg>
                    <p>请选择型号以查看可选配置</p>
                </div>
            </div>
            
            <!-- 订单摘要 -->
            <div class="order-summary" id="order-summary">
                <h3 class="summary-title">订单摘要</h3>
                <div class="empty-state" style="padding: 40px 20px;">
                    <p>选择型号和配置后<br>将显示订单详情</p>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 加载遮罩 -->
    <div class="loading-overlay hidden" id="loading-overlay">
        <div class="loading-content">
            <div class="loading-spinner"></div>
            <p>处理中...</p>
        </div>
    </div>
    
    <script>
        // 全局状态
        let selectedModel = '';
        let selectedConfig = {};
        let modelConfigs = [];
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            checkLoginStatus();
            loadModels();
        });
        
        // 检查登录状态
        async function checkLoginStatus() {
            try {
                const response = await fetch('/api/check-login');
                const data = await response.json();
                
                const userInfo = document.getElementById('user-info');
                const userName = document.getElementById('user-name');
                
                if (data.logged_in) {
                    userInfo.style.display = 'flex';
                    userName.textContent = data.user.name || data.user.netid || '用户';
                } else {
                    userInfo.style.display = 'none';
                }
            } catch (error) {
                console.error('检查登录状态失败:', error);
            }
        }
        
        // 退出登录
        async function logout() {
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = '/login';
        }
        
        // 加载型号列表
        async function loadModels() {
            try {
                const response = await fetch('/api/apple/models/Laptop');
                const data = await response.json();
                
                const container = document.getElementById('model-options');
                
                if (data.success && data.data.length > 0) {
                    container.innerHTML = data.data.map(model => `
                        <button class="model-btn ${model === selectedModel ? 'active' : ''}" 
                                data-model="${model}" onclick="selectModel('${model}')">
                            ${model}
                        </button>
                    `).join('');
                    
                    // 默认选择第一个型号或URL参数中的型号
                    const urlModel = new URLSearchParams(window.location.search).get('model');
                    if (urlModel && data.data.includes(urlModel)) {
                        selectModel(urlModel);
                    } else {
                        selectModel(data.data[0]);
                    }
                } else {
                    container.innerHTML = '<p style="color: var(--text-secondary);">暂无可选型号</p>';
                }
            } catch (error) {
                console.error('加载型号列表失败:', error);
            }
        }
        
        // 选择型号
        async function selectModel(model) {
            selectedModel = model;
            selectedConfig = {};
            
            // 更新按钮状态
            document.querySelectorAll('.model-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.model === model);
            });
            
            // 加载配置选项
            await loadConfigOptions(model);
            updateOrderSummary();
        }
        
        // 加载配置选项
        async function loadConfigOptions(model) {
            const container = document.getElementById('config-options');
            container.innerHTML = '<div class="text-center" style="padding: 40px;"><span class="loading"></span> 加载配置中...</div>';
            
            try {
                // 并行加载配置列表和选项
                const [configsRes, optionsRes] = await Promise.all([
                    fetch(`/api/apple/configurations?model_name=${encodeURIComponent(model)}&device_type=Laptop`),
                    fetch(`/api/apple/selection-options?model_name=${encodeURIComponent(model)}&device_type=Laptop`)
                ]);
                
                const configsData = await configsRes.json();
                const optionsData = await optionsRes.json();
                
                modelConfigs = configsData.data || [];
                const options = optionsData.data || {};
                
                // 构建配置面板
                let html = '';
                
                // 基础配置（CPU、内存、存储）- 如果有预定义配置列表
                if (modelConfigs.length > 0) {
                    html += `
                        <div class="config-group">
                            <div class="config-group-title">选择配置 <span class="tag">点击直接选择</span></div>
                            <div class="config-grid">
                                ${modelConfigs.map((config, idx) => `
                                    <div class="config-option ${idx === 0 ? 'selected' : ''}" 
                                         data-idx="${idx}" onclick="selectConfigItem(${idx})">
                                        <div class="config-option-name">${config.configuration || '标准配置'}</div>
                                        <div class="config-option-price">¥${formatPrice(config.discount_price)}</div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                    
                    // 默认选择第一个配置
                    if (modelConfigs.length > 0 && !selectedConfig.idx) {
                        selectedConfig = { idx: 0 };
                    }
                } else {
                    // 无预定义配置，显示各个选项
                    if (options.cpu && options.cpu.length > 0) {
                        html += createConfigGroup('处理器', 'cpu', options.cpu);
                    }
                    if (options.memory && options.memory.length > 0) {
                        html += createConfigGroup('内存', 'memory', options.memory);
                    }
                    if (options.hard_disk && options.hard_disk.length > 0) {
                        html += createConfigGroup('存储', 'hard_disk', options.hard_disk);
                    }
                }
                
                container.innerHTML = html || '<div class="empty-state"><p>暂无可选配置</p></div>';
                
                // 如果有预定义配置，更新摘要
                if (modelConfigs.length > 0) {
                    updateOrderSummary();
                }
                
            } catch (error) {
                console.error('加载配置选项失败:', error);
                container.innerHTML = '<p style="color: var(--error-color); text-align: center;">加载失败，请刷新重试</p>';
            }
        }
        
        // 创建配置组
        function createConfigGroup(title, key, values) {
            return `
                <div class="config-group">
                    <div class="config-group-title">${title}</div>
                    <div class="config-grid">
                        ${values.map((value, idx) => `
                            <div class="config-option ${idx === 0 ? 'selected' : ''}" 
                                 data-key="${key}" data-value="${value}" onclick="selectOption(this)">
                                <div class="config-option-name">${value}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }
        
        // 选择配置项（预定义配置）
        function selectConfigItem(idx) {
            selectedConfig = { idx };
            
            document.querySelectorAll('.config-option[data-idx]').forEach(opt => {
                opt.classList.toggle('selected', parseInt(opt.dataset.idx) === idx);
            });
            
            updateOrderSummary();
        }
        
        // 选择选项（自定义配置）
        function selectOption(el) {
            const key = el.dataset.key;
            const value = el.dataset.value;
            
            selectedConfig[key] = value;
            
            el.parentElement.querySelectorAll('.config-option').forEach(opt => {
                opt.classList.toggle('selected', opt === el);
            });
            
            updateOrderSummary();
        }
        
        // 更新订单摘要
        function updateOrderSummary() {
            const container = document.getElementById('order-summary');
            
            if (!selectedModel) {
                container.innerHTML = `
                    <h3 class="summary-title">订单摘要</h3>
                    <div class="empty-state" style="padding: 40px 20px;">
                        <p>选择型号和配置后<br>将显示订单详情</p>
                    </div>
                `;
                return;
            }
            
            let productHtml = '';
            let configItems = [];
            let totalPrice = 0;
            let originalPrice = 0;
            let discountRate = 0;
            
            if (modelConfigs.length > 0 && selectedConfig.idx !== undefined) {
                const config = modelConfigs[selectedConfig.idx];
                productHtml = `
                    <div class="summary-product">
                        <div class="product-image">
                            <svg viewBox="0 0 24 24"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.21-1.96 1.08-3.11-1.06.05-2.36.69-3.14 1.55-.68.75-1.26 1.94-1.1 3.07 1.19.09 2.41-.79 3.16-1.51z"/></svg>
                        </div>
                        <div class="product-info">
                            <h4>${selectedModel}</h4>
                            <p>${config.configuration || '标准配置'}</p>
                        </div>
                    </div>
                `;
                
                configItems = [
                    { label: '处理器', value: config.cpu || '-' },
                    { label: '内存', value: config.memory || '-' },
                    { label: '存储', value: config.hard_disk || '-' },
                    { label: '显卡', value: config.graphic_card || '-' },
                    { label: '屏幕', value: config.screen || '-' }
                ];
                
                totalPrice = config.discount_price || 0;
                originalPrice = config.original_price || 0;
                discountRate = config.discount_rate || 0;
            } else {
                productHtml = `
                    <div class="summary-product">
                        <div class="product-image">
                            <svg viewBox="0 0 24 24"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.21-1.96 1.08-3.11-1.06.05-2.36.69-3.14 1.55-.68.75-1.26 1.94-1.1 3.07 1.19.09 2.41-.79 3.16-1.51z"/></svg>
                        </div>
                        <div class="product-info">
                            <h4>${selectedModel}</h4>
                            <p>自定义配置</p>
                        </div>
                    </div>
                `;
                
                // 显示已选择的配置
                const configLabels = { cpu: '处理器', memory: '内存', hard_disk: '存储' };
                Object.entries(selectedConfig).forEach(([key, value]) => {
                    if (configLabels[key]) {
                        configItems.push({ label: configLabels[key], value });
                    }
                });
            }
            
            // 构建摘要HTML
            let summaryHtml = `
                <h3 class="summary-title">订单摘要</h3>
                ${productHtml}
                <div class="summary-config">
                    ${configItems.map(item => `
                        <div class="config-item">
                            <span class="config-item-label">${item.label}</span>
                            <span class="config-item-value">${item.value}</span>
                        </div>
                    `).join('')}
                </div>
                <div class="summary-divider"></div>
            `;
            
            if (originalPrice > 0 && originalPrice > totalPrice) {
                summaryHtml += `
                    <div class="summary-price-row">
                        <span>原价</span>
                        <span class="price-original">¥${formatPrice(originalPrice)}</span>
                    </div>
                    <div class="summary-price-row price-discount">
                        <span>教育优惠 (${(discountRate * 100).toFixed(0)}% off)</span>
                        <span>-¥${formatPrice(originalPrice - totalPrice)}</span>
                    </div>
                `;
            }
            
            summaryHtml += `
                <div class="summary-price-row total">
                    <span>总计</span>
                    <span>¥${formatPrice(totalPrice)}</span>
                </div>
                
                <div class="summary-actions">
                    <button class="btn btn-primary btn-block btn-large" onclick="submitOrder()">提交订单</button>
                    <button class="btn btn-secondary btn-block" onclick="addToCart()">加入购物车</button>
                </div>
                
                <p class="summary-note">价格已包含三年有限保修<br>支持分期付款，具体请咨询财务处</p>
            `;
            
            container.innerHTML = summaryHtml;
        }
        
        // 格式化价格
        function formatPrice(price) {
            if (!price) return '---';
            return Number(price).toLocaleString('zh-CN', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
        }
        
        // 提交订单
        async function submitOrder() {
            const overlay = document.getElementById('loading-overlay');
            overlay.classList.remove('hidden');
            
            try {
                const config = modelConfigs[selectedConfig.idx] || {};
                
                const response = await fetch('/api/order/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        brand: 'Apple',
                        device_type: 'Laptop',
                        model_name: selectedModel,
                        cpu: config.cpu,
                        memory: config.memory,
                        hard_disk: config.hard_disk,
                        graphic_card: config.graphic_card,
                        screen: config.screen,
                        total_price: config.discount_price,
                        remark: ''
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert(`订单提交成功！订单号：${data.order_number}`);
                    window.location.href = '/';
                } else {
                    alert(data.message || '订单提交失败');
                }
            } catch (error) {
                alert('网络错误，请重试');
            } finally {
                overlay.classList.add('hidden');
            }
        }
        
        // 加入购物车
        async function addToCart() {
            try {
                const config = modelConfigs[selectedConfig.idx] || {};
                
                const response = await fetch('/api/cart/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        brand: 'Apple',
                        device_type: 'Laptop',
                        model_name: selectedModel,
                        configuration_id: config.id,
                        selected_config: config
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert('已加入购物车');
                } else {
                    alert(data.message || '请先登录');
                    if (data.message && data.message.includes('登录')) {
                        window.location.href = '/login';
                    }
                }
            } catch (error) {
                alert('网络错误，请重试');
            }
        }
    </script>
</body>
</html>
