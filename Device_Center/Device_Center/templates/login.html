<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 学校电脑设备选配中心</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-card {
            width: 100%;
            max-width: 440px;
            padding: 48px 40px;
            background: var(--card-background);
            border-radius: 24px;
            box-shadow: var(--shadow);
        }
        
        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .login-logo svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
        }
        
        .login-title {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
            text-align: center;
        }
        
        .login-subtitle {
            font-size: 17px;
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 32px;
        }
        
        .login-tabs {
            display: flex;
            margin-bottom: 32px;
            background: #f5f5f7;
            border-radius: 12px;
            padding: 4px;
        }
        
        .login-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            background: transparent;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .login-tab.active {
            background: var(--card-background);
            color: var(--text-primary);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }
        
        .login-form {
            display: none;
        }
        
        .login-form.active {
            display: block;
        }
        
        .netid-hint {
            font-size: 13px;
            color: var(--text-secondary);
            text-align: center;
            margin-top: 24px;
            padding: 16px;
            background: #f5f5f7;
            border-radius: 12px;
        }
        
        .netid-hint strong {
            color: var(--text-primary);
        }
        
        .divider-text {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: var(--text-secondary);
            font-size: 13px;
        }
        
        .divider-text::before,
        .divider-text::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }
        
        .divider-text span {
            padding: 0 16px;
        }
        
        .admin-login-link {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
        }
        
        .message {
            padding: 12px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        
        .message-error {
            background: rgba(255, 59, 48, 0.1);
            color: var(--error-color);
        }
        
        .message-success {
            background: rgba(40, 205, 65, 0.1);
            color: var(--success-color);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="4" y="2" width="16" height="20" rx="2" stroke="currentColor" stroke-width="2"/>
                    <line x1="4" y1="8" x2="20" y2="8" stroke="currentColor" stroke-width="2"/>
                    <circle cx="12" cy="16" r="3" stroke="currentColor" stroke-width="2"/>
                </svg>
            </div>
            
            <h1 class="login-title">欢迎使用</h1>
            <p class="login-subtitle">学校电脑设备选配中心</p>
            
            <div id="message-container"></div>
            
            <div class="login-tabs">
                <button class="login-tab active" data-tab="netid">NETID 登录</button>
                <button class="login-tab" data-tab="admin">管理员登录</button>
            </div>
            
            <!-- NETID登录表单 -->
            <form id="netid-form" class="login-form active">
                <div class="form-group">
                    <label class="form-label" for="netid">NETID</label>
                    <input type="text" id="netid" class="form-input" 
                           placeholder="请输入学校NETID" autocomplete="off">
                </div>
                <button type="submit" class="btn btn-primary btn-block btn-large" id="netid-submit">
                    一键登录
                </button>
                
                <div class="netid-hint">
                    <strong>提示：</strong>请使用学校统一身份认证（NETID）登录<br>
                    无需注册，输入NETID即可自动登录
                </div>
            </form>
            
            <!-- 管理员登录表单 -->
            <form id="admin-form" class="login-form">
                <div class="form-group">
                    <label class="form-label" for="username">用户名</label>
                    <input type="text" id="username" class="form-input" 
                           placeholder="请输入用户名" autocomplete="off">
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">密码</label>
                    <input type="password" id="password" class="form-input" 
                           placeholder="请输入密码" autocomplete="off">
                </div>
                <button type="submit" class="btn btn-primary btn-block btn-large" id="admin-submit">
                    登录
                </button>
                
                <div class="admin-login-link">
                    <a href="#" onclick="showNetidLogin(); return false;">返回教职工登录</a>
                </div>
            </form>
            
            <div class="divider-text">
                <span>或</span>
            </div>
            
            <a href="{{ url_for('index') }}" class="btn btn-secondary btn-block btn-large" style="margin-top: 0;">
                返回首页
            </a>
        </div>
    </div>
    
    <script>
        // 标签切换
        document.querySelectorAll('.login-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                const tabName = this.dataset.tab;
                
                // 更新标签状态
                document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                
                // 更新表单状态
                document.querySelectorAll('.login-form').forEach(f => f.classList.remove('active'));
                document.getElementById(tabName + '-form').classList.add('active');
                
                // 清空消息
                document.getElementById('message-container').innerHTML = '';
            });
        });
        
        function showNetidLogin() {
            document.querySelectorAll('.login-tab')[0].click();
        }
        
        function showMessage(type, message) {
            const container = document.getElementById('message-container');
            container.innerHTML = `<div class="message message-${type}">${message}</div>`;
        }
        
        // NETID登录
        document.getElementById('netid-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const netid = document.getElementById('netid').value.trim();
            const submitBtn = document.getElementById('netid-submit');
            
            if (!netid) {
                showMessage('error', '请输入NETID');
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading"></span> 登录中...';
            
            try {
                const response = await fetch('/api/netid-login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ netid })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showMessage('success', '登录成功，正在跳转...');
                    setTimeout(() => {
                        window.location.href = '/apple';
                    }, 1000);
                } else {
                    showMessage('error', data.message || '登录失败');
                }
            } catch (error) {
                showMessage('error', '网络错误，请重试');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '一键登录';
            }
        });
        
        // 管理员登录
        document.getElementById('admin-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('admin-submit');
            
            if (!username || !password) {
                showMessage('error', '请输入用户名和密码');
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading"></span> 登录中...';
            
            try {
                const response = await fetch('/api/admin-login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showMessage('success', '登录成功，正在跳转...');
                    setTimeout(() => {
                        window.location.href = '/admin';
                    }, 1000);
                } else {
                    showMessage('error', data.message || '用户名或密码错误');
                }
            } catch (error) {
                showMessage('error', '网络错误，请重试');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '登录';
            }
        });
        
        // 检查登录状态
        async function checkLoginStatus() {
            try {
                const response = await fetch('/api/check-login');
                const data = await response.json();
                
                if (data.logged_in) {
                    // 已登录，跳转到对应页面
                    if (data.login_type === 'admin') {
                        window.location.href = '/admin';
                    } else {
                        window.location.href = '/apple';
                    }
                }
            } catch (error) {
                // 忽略错误
            }
        }
        
        checkLoginStatus();
    </script>
</body>
</html>
